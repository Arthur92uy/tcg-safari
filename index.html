<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <title>Inicio - TCG Safari</title>
</head>
<body>
    <div class="layout">
        <header class="header section--glass">
            <nav class="header__nav">
                <ul class="nav__list">
                    <li class="nav__item">
                        <a href="" class="nav__link">
                            <img src="./resources/images/iconos-nav/ico-pichu.png" alt="Pichu icon" class="nav__image--default">
                            <img src="./resources/images/iconos-nav/ico-pikachu.png" alt="Pikachu icon" class="nav__image--hover">
                            Inicio
                        </a>
                    </li>
                    <li class="nav__item">
                        <a href="" class="nav__link">
                            <img src="./resources/images/iconos-nav/ico-bulbasaur.png" alt="Bulbasaur icon" class="nav__image--default">
                            <img src="./resources/images/iconos-nav/ico-ivysaur.png" alt="Ivysaur icon" class="nav__image--hover">
                            Expansiones
                        </a>
                    </li>
                    <li class="nav__item">
                        <a href="" class="nav__link">
                            <img src="./resources/images/iconos-nav/ico-caterpie.png" alt="Caterpie icon" class="nav__image--default">
                            <img src="./resources/images/iconos-nav/ico-metapod.png" alt="Metapod icon" class="nav__image--hover">
                            Ir de Safari
                        </a>
                    </li>
                    <li class="nav__item">
                        <a href="" class="nav__link">
                            <img src="./resources/images/iconos-nav/ico-charmander.png" alt="Charmander icon" class="nav__image--default">
                            <img src="./resources/images/iconos-nav/ico-charmeleon.png" alt="Charmeleon icon" class="nav__image--hover">
                            Blog/News
                        </a>
                    </li>
                    <li class="nav__item">
                        <a href="" class="nav__link">
                            <img src="./resources/images/iconos-nav/ico-squirtle.png" alt="Squirtle icon" class="nav__image--default">
                            <img src="./resources/images/iconos-nav/ico-wartortle.png" alt="Wartortle icon" class="nav__image--hover">
                            Contacto
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="header__avatar">
                <a href="./pages/login.html">
                    <img src="./resources/images/iconos-avatar/ico-avatar-mewtwo.png" alt="Avatar de usuario">
                    <span>Cuenta</span>
                </a>
                <img src="./resources/images//iconos-avatar/ico-desplegar-abajo.png" alt="Icono desplegable">
            </div>
        </header>

        <main class="main">
            
            <section class="hero section--glass">
                <div class="hero__content">
                    <h1 class="hero__title">
                        Atrapa tu<br>
                        carta favorita en 
                        <span>TCG-Safari</span>
                    </h1>
                    <p class="hero__subtitle">
                        Captura nuevas cartas raras, intercambia con otros entrenadores y luce tu pokedex
                    </p>
                    <a href="#explorar" class="hero__cta">
                        Explorar cartas
                    </a>
                </div>
                <div class="hero__image">
                    <img src="./resources/images/hero/img-hero-199.png" alt="" class="hero__img">
                </div>
            </section>

            <section class="search section--glass">
                <form class="search__form" action="#" method="get">
                    <label for="search-input" class="search__label">Buscar carta</label>
                    <input type="text" name="q" id="search-input" class="search__input" placeholder="Buscar por número (ejemplo: 199/204), por nombre, expansión o entrenador.">
                    <button type="submit" class="search__button">Buscar</button>
                </form>
            </section>

            <section class="">

            </section>
        </main>

        <footer class="footer section--glass">
        </footer>
    </div>
    <script src="./js/login.js"></script>
</body>
</html>
